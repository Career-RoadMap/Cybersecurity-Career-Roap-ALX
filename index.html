<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALX Cybersecurity Career & Resources Portal</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden;
            background-color: #f8fafc;
        }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Watermark Background */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            opacity: 0.05;
            z-index: -10;
            width: 60vw;
            pointer-events: none;
            filter: grayscale(100%);
        }

        .tab-content { min-height: 550px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #002b56; border-radius: 10px; }
        
        .role-content {
            transition: max-height 0.3s ease-out, opacity 0.2s ease-in;
            overflow: hidden;
        }

        .nav-active {
            background-color: #002b56 !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="text-slate-900">
    <!-- Background Watermark -->
    <img src="asset/images/Alx%20black%20transparent.png" alt="" class="watermark">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const RoleItem = ({ title, desc }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="border-b border-slate-100 last:border-0">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full flex items-center justify-between py-3 group text-left hover:bg-slate-50/80 px-3 rounded-lg transition-all"
                    >
                        <div className="flex items-center gap-3">
                            <div className={`w-1.5 h-1.5 rounded-full transition-all duration-300 ${isOpen ? 'bg-[#05F283] scale-150' : 'bg-slate-300'}`} />
                            <span className={`text-xs md:text-sm font-semibold transition-colors ${isOpen ? 'text-[#002b56]' : 'text-slate-600'}`}>{title}</span>
                        </div>
                        <Icon name={isOpen ? "minus" : "plus"} size={14} className="text-slate-400" />
                    </button>
                    <div className={`role-content ${isOpen ? 'max-h-60 opacity-100 mb-4' : 'max-h-0 opacity-0'}`}>
                        <div className="ml-7 mr-2 p-3 bg-white rounded-lg border-l-4 border-[#05F283] shadow-sm">
                            <p className="text-[11px] md:text-xs text-slate-500 leading-relaxed italic">
                                {desc}
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('map');

            const careerData = [
                {
                    level: "Level 1: Entry (0-2 Years)",
                    desc: "Foundational Operations",
                    tracks: [
                        {
                            name: "Defensive", icon: "shield", color: "border-[#27DEF2]",
                            roles: [
                                { title: "Junior SOC Analyst", desc: "Monitors security dashboards 24/7. Detects and triages initial alerts before they become breaches." },
                                { title: "Email Security Analyst", desc: "Digital gatekeeper. Analyzes headers to stop phishing and BEC attacks." },
                                { title: "IAM Provisioner", desc: "Controls user identities and access rights within Active Directory." }
                            ],
                            certs: "Security+, BTL1, ISC2"
                        },
                        {
                            name: "Offensive", icon: "zap", color: "border-[#FF5347]",
                            roles: [
                                { title: "Junior PenTester", desc: "The Scout. Performs authorized scans and initial probes to find open ports." },
                                { title: "OSINT Specialist", desc: "Digital Detective. Finds exposed company data using public sources." },
                                { title: "Vulnerability Analyst", desc: "Uses automated tools like Nessus to find unpatched software." }
                            ],
                            certs: "eJPT, PenTest+"
                        },
                        {
                            name: "Strategic", icon: "scale", color: "border-[#564887]",
                            roles: [
                                { title: "GRC Compliance Analyst", desc: "The Verifier. Ensures internal rules match local and international laws like ISO 27001." },
                                { title: "Policy Writer", desc: "Translates tech requirements into readable handbooks for employees." },
                                { title: "Privacy Assistant", desc: "Assisting with NDPR/GDPR compliance and initial data mapping." }
                            ],
                            certs: "Sec+, ITCA"
                        }
                    ]
                },
                {
                    level: "Level 2: Intermediate (2-5 Years)",
                    desc: "Technical Mastery",
                    tracks: [
                        {
                            name: "Defensive", icon: "activity", color: "border-[#27DEF2]",
                            roles: [
                                { title: "Malware Analyst", desc: "The Scientist. Reverse-engineers code in sandboxes to understand and block threat behavior." },
                                { title: "Incident Responder", desc: "The Firefighter. Executes rapid containment and recovery during active breaches." },
                                { title: "Forensics Investigator", desc: "Performs digital autopsies on drives and RAM to find evidence of intrusion." }
                            ],
                            certs: "CySA+, GCIH"
                        },
                        {
                            name: "Offensive", icon: "target", color: "border-[#FF5347]",
                            roles: [
                                { title: "Ethical Hacker", desc: "The Infiltrator. Authorized attacks to prove risk to leadership before real hackers do." },
                                { title: "API Security Tester", desc: "Tests hidden communication lines between apps for security flaws." }
                            ],
                            certs: "OSCP, PNPT"
                        },
                        {
                            name: "Specialized", icon: "brain", color: "border-[#05F283]",
                            roles: [
                                { title: "AI Security Engineer", desc: "Protects LLMs from Prompt Injection and ensures AI models don't leak secret data." },
                                { title: "Data Privacy Officer (DPO)", desc: "The legal gatekeeper for ethical data protection and global regulatory compliance." }
                            ],
                            certs: "CIPP, AI-102"
                        }
                    ]
                },
                {
                    level: "Level 3: Advanced (5-8 Years)",
                    desc: "Architecture & Design",
                    tracks: [
                        {
                            name: "Defensive", icon: "lock", color: "border-[#27DEF2]",
                            roles: [
                                { title: "Security Architect", desc: "Designs the overall resilient framework for the entire enterprise infrastructure." },
                                { title: "Detection Engineer", desc: "Writes custom logic and SIEM rules to turn raw logs into high-fidelity alerts." },
                                { title: "Purple Team Lead", desc: "Coordinating Red and Blue teams to optimize the organizational defense posture." }
                            ],
                            certs: "CISSP, CASP+"
                        },
                        {
                            name: "Offensive", icon: "cpu", color: "border-[#FF5347]",
                            roles: [
                                { title: "Red Team Operator", desc: "Conducts long-term stealthy simulations of APT (Advanced Persistent Threat) actors." },
                                { title: "Exploit Developer", desc: "Writing custom code to bypass specific security products and EDR tools." },
                                { title: "Adversary Lead", desc: "Designing complex attack scenarios to pressure-test the SOC infrastructure." }
                            ],
                            certs: "OSWE, GXPN"
                        },
                        {
                            name: "Strategic", icon: "globe", color: "border-[#564887]",
                            roles: [
                                { title: "Risk Manager", desc: "Translates technical debt into quantifiable business risk for the Board of Directors." },
                                { title: "Compliance Director", desc: "Managing global regulatory alignment and large-scale security audits." },
                                { title: "BCP Planner", desc: "Designing resilience strategies for disaster recovery and business continuity." }
                            ],
                            certs: "CISM, CRISC"
                        }
                    ]
                },
                {
                    level: "Level 4: Leadership (8+ Years)",
                    desc: "Strategy & Governance",
                    tracks: [
                        {
                            name: "Operations", icon: "users", color: "border-[#27DEF2]",
                            roles: [
                                { title: "Director of SOC Ops", desc: "Managing the budget, staff, and technology stack for the entire defense center." },
                                { title: "Head of Incident Response", desc: "Executive leadership during major crises and board-level reporting." }
                            ],
                            certs: "CISSP-ISSMP"
                        },
                        {
                            name: "Executive", icon: "crown", color: "border-[#564887]",
                            roles: [
                                { title: "CISO", desc: "Chief Information Security Officer. The executive lead bridging security with business growth." },
                                { title: "Chief Privacy Officer", desc: "Overseeing global data sovereignty and high-level legal privacy strategy." }
                            ],
                            certs: "CCISO, MBA"
                        },
                        {
                            name: "Innovation", icon: "lightbulb", color: "border-[#05F283]",
                            roles: [
                                { title: "Security Strategist", desc: "Forecasting future threats and aligning the security roadmap with emerging tech." },
                                { title: "vCISO Consultant", desc: "Providing high-level security leadership for multiple tech startups as a service." }
                            ],
                            certs: "CISM"
                        }
                    ]
                }
            ];

            const toolkit = [
                { name: "Wireshark", category: "Network", desc: "The world's foremost network protocol analyzer. Used for deep-packet inspection." },
                { name: "Nmap", category: "Recon", desc: "Network discovery and security auditing. Essential for mapping the attack surface." },
                { name: "BloodHound", category: "Identity", desc: "Visualizing AD attack paths and revealing unintended trust relationships." },
                { name: "Nessus", category: "Vuln Mgmt", desc: "Professional-grade vulnerability assessment scanner for enterprise networks." },
                { name: "Burp Suite", category: "Web App", desc: "Integrated platform for performing security testing of web applications." },
                { name: "Metasploit", category: "Exploit", desc: "Framework for developing and executing exploit code against remote targets." }
            ];

            const checklist = [
                { step: "1. Professional Profile", detail: "Update LinkedIn with 'Cybersecurity Graduate' and list specific labs like Kerberoasting and SIEM Triage." },
                { step: "2. Technical Portfolio", detail: "Publish a GitHub repository showing Nmap scan reports, Python automation scripts, or CTF write-ups." },
                { step: "3. Certification Target", detail: "Set a date for the CompTIA Security+ or BTL1 exam to solidify your professional credibility." },
                { step: "4. Niche Selection", detail: "Decide whether to focus on Blue Team (SOC), Red Team (Offense), or GRC (Strategic)." },
                { step: "5. Networking", detail: "Join industry communities like OWASP, ISACA, or local security meetups to find mentorship." }
            ];

            return (
                <div className="min-h-screen relative z-10 flex flex-col">
                    {/* Header */}
                    <header className="bg-[#002b56] text-white pt-6 pb-12 px-6 text-center relative overflow-hidden shadow-2xl">
                        <div className="absolute top-0 left-0 w-full h-1.5 flex">
                            <div className="flex-1 bg-[#05F283]" />
                            <div className="flex-1 bg-[#564887]" />
                            <div className="flex-1 bg-[#27DEF2]" />
                        </div>
                        <div className="max-w-4xl mx-auto relative z-10 flex flex-col items-center">
                            <img src="asset/images/alx%20white%20tranparent.png" alt="ALX" className="h-10 mb-4 opacity-100 drop-shadow-lg" />
                            <h1 className="text-2xl md:text-4xl font-bold tracking-tight">Cybersecurity <span className="text-[#05F283]">Master Portal</span></h1>
                            <p className="text-[10px] md:text-xs text-slate-400 font-bold uppercase tracking-[0.4em] mt-1">TAMBALI >>> READY TO LAUNCH</p>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="max-w-7xl mx-auto -mt-6 px-4 relative z-30 w-full">
                        <div className="bg-white rounded-xl shadow-xl p-1 flex flex-wrap gap-1 border border-slate-200">
                            {[
                                { id: 'map', label: 'Career Map', icon: 'trending-up' },
                                { id: 'toolkit', label: 'Security Toolkit', icon: 'wrench' },
                                { id: 'checklist', label: 'Checklist', icon: 'check-square' },
                                { id: 'specialties', label: 'AI & Privacy', icon: 'brain' },
                                { id: 'benchmarks', label: 'Benchmarks', icon: 'award' },
                                { id: 'biz', label: 'Launch Business', icon: 'rocket' }
                            ].map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex-1 min-w-[110px] py-2.5 px-2 rounded-lg font-bold flex items-center justify-center gap-2 text-[10px] md:text-xs transition-all ${activeTab === tab.id ? 'nav-active' : 'hover:bg-slate-50 text-slate-500'}`}
                                >
                                    <Icon name={tab.icon} size={14} /> {tab.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto mt-10 px-6 tab-content flex-grow w-full">
                        {/* TAB: CAREER MAP */}
                        {activeTab === 'map' && (
                            <div className="space-y-12 animate-in">
                                {careerData.map((lvl, idx) => (
                                    <section key={idx}>
                                        <div className="flex items-center gap-4 mb-6">
                                            <div className="w-10 h-10 rounded-full bg-[#002b56] text-[#05F283] flex items-center justify-center font-bold text-lg shadow-md border border-white/20">
                                                {idx + 1}
                                            </div>
                                            <h2 className="text-xl md:text-2xl font-bold text-[#002b56]">{lvl.level}</h2>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            {lvl.tracks.map((track, tidx) => (
                                                <div key={tidx} className={`bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-sm border-t-[6px] transition-all hover:shadow-lg ${track.color}`}>
                                                    <div className="flex items-center justify-between mb-4 border-b border-slate-50 pb-2">
                                                        <div className="flex items-center gap-2 font-bold uppercase tracking-tighter text-slate-800">
                                                            <Icon name={track.icon} /> {track.name}
                                                        </div>
                                                        <span className="text-[8px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500 font-bold uppercase">Track</span>
                                                    </div>
                                                    <div className="space-y-1 mb-6">
                                                        {track.roles.map(r => (
                                                            <RoleItem key={r.title} title={r.title} desc={r.desc} />
                                                        ))}
                                                    </div>
                                                    <div className="pt-4 border-t border-slate-100">
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase mb-2">Target Certifications</p>
                                                        <span className="text-[10px] font-bold bg-slate-50 border border-slate-200 px-2 py-1 rounded text-slate-600 block text-center truncate shadow-sm">{track.certs}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        )}

                        {/* TAB: TOOLKIT */}
                        {activeTab === 'toolkit' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                                {toolkit.map((tool, i) => (
                                    <div key={i} className="bg-white p-6 rounded-2xl shadow-md border-l-4 border-[#05F283] hover:shadow-lg transition-shadow">
                                        <div className="flex justify-between items-start mb-3">
                                            <h3 className="font-bold text-[#002b56] text-lg">{tool.name}</h3>
                                            <span className="text-[9px] bg-slate-100 px-2 py-0.5 rounded font-bold text-slate-500 uppercase">{tool.category}</span>
                                        </div>
                                        <p className="text-xs text-slate-500 leading-relaxed italic">"{tool.desc}"</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* TAB: CHECKLIST */}
                        {activeTab === 'checklist' && (
                            <div className="max-w-3xl mx-auto space-y-4 animate-in">
                                <div className="bg-[#002b56] p-8 rounded-3xl text-white mb-6 text-center shadow-xl">
                                    <h2 className="text-2xl font-bold mb-2">Graduation Success Checklist</h2>
                                    <p className="text-slate-300 text-sm">Follow these steps to launch your career within 90 days of graduation.</p>
                                </div>
                                {checklist.map((item, i) => (
                                    <div key={i} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex gap-5 hover:bg-slate-50 transition-colors">
                                        <div className="w-10 h-10 rounded-full bg-[#05F283]/20 text-[#002b56] flex items-center justify-center shrink-0 font-bold text-base shadow-sm">{i+1}</div>
                                        <div>
                                            <h4 className="font-bold text-[#002b56] text-sm md:text-base">{item.step}</h4>
                                            <p className="text-xs md:text-sm text-slate-500 mt-1 leading-relaxed">{item.detail}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* TAB: SPECIALTIES (AI & PRIVACY) */}
                        {activeTab === 'specialties' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-in max-w-5xl mx-auto">
                                <div className="bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-xl border-l-[12px] border-[#05F283]">
                                    <div className="w-12 h-12 bg-[#05F283]/10 text-[#05F283] rounded-2xl flex items-center justify-center mb-6 shadow-sm">
                                        <Icon name="brain" size={24} />
                                    </div>
                                    <h2 className="text-2xl font-bold text-[#002b56] mb-2">AI Security Track</h2>
                                    <p className="text-sm text-slate-500 mb-6">Securing Automated Systems and LLM Infrastructures.</p>
                                    <div className="space-y-1">
                                        <RoleItem title="LLM Red Teaming" desc="The New Frontier: Attacking AI models to uncover prompt injections, model hijacking, and data poisoning risks." />
                                        <RoleItem title="AI SIEM Operations" desc="Defensive Engineering: Using Machine Learning to predict attacker behavior before the breach occurs." />
                                    </div>
                                </div>
                                <div className="bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-xl border-l-[12px] border-[#564887]">
                                    <div className="w-12 h-12 bg-[#564887]/10 text-[#564887] rounded-2xl flex items-center justify-center mb-6 shadow-sm">
                                        <Icon name="lock" size={24} />
                                    </div>
                                    <h2 className="text-2xl font-bold text-[#002b56] mb-2">Data Privacy (DPO)</h2>
                                    <p className="text-sm text-slate-500 mb-6">Global Compliance and Ethical Data Protection.</p>
                                    <div className="space-y-1">
                                        <RoleItem title="Privacy Impact (PIA)" desc="The Auditor: Evaluating high-stakes product launches for compliance with GDPR, NDPR, and CCPA." />
                                        <RoleItem title="Subject Rights Lead" desc="The Guardian: Managing complex user data access and the 'Right to be Forgotten' requests." />
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: BIZ */}
                        {activeTab === 'biz' && (
                            <div className="space-y-8 animate-in max-w-6xl mx-auto">
                                <div className="bg-[#002b56] p-10 rounded-3xl text-white shadow-xl relative overflow-hidden border-b-8 border-[#05F283]">
                                    <div className="relative z-10">
                                        <h2 className="text-3xl font-bold mb-2">Entrepreneurial Roadmap</h2>
                                        <p className="text-slate-200 text-sm italic">"Don't just watch the SOC—Build the SOC." Convert technical mastery into a scalable business model.</p>
                                    </div>
                                    <Icon name="rocket" size={100} className="absolute -right-5 -bottom-5 opacity-10 rotate-12" />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    {[
                                        { tier: 'Phase 1: Knowledge', roles: [{t: 'Cyber Content Creator', d: 'YouTube/Blogs'}, {t: 'Security Trainer', d: 'Corporate Workshops'}] },
                                        { tier: 'Phase 2: Agency', roles: [{t: 'Managed GRC', d: 'Audit Prep Agency'}, {t: 'Vuln-as-a-Service', d: 'Monthly Scans'}] },
                                        { tier: 'Phase 3: Consultancy', roles: [{t: 'vCISO', d: 'Fractional Leadership'}, {t: 'Bespoke MSSP', d: 'Small SOC Ops'}] }

                                        <div key={i} className="bg-white/95 backdrop-blur-md rounded-2xl p-6 shadow-lg border-t-8 border-[#564887]">

                                            <div className="space-y-1">
                                                {item.roles.map((r, ri) => (
                                                    <RoleItem key={ri} title={r.t} desc={r.d} />
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* TAB: BENCHMARKS */}
                        {activeTab === 'benchmarks' && (
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden animate-in border border-slate-100 max-w-4xl mx-auto">
                                <div className="bg-[#564887] p-8 text-white text-center">
                                    <h2 className="text-xl font-bold flex items-center justify-center gap-3"><Icon name="award" /> Industry Benchmarks</h2>
                                </div>
                                <div className="p-8 text-sm space-y-4">
                                    <div className="flex justify-between border-b pb-2 font-medium"><strong>Level 1 (Entry)</strong><span className="font-bold text-[#564887]">$55k - $85k</span></div>
                                    <div className="flex justify-between border-b pb-2 font-medium"><strong>Level 2 (Specialist)</strong><span className="font-bold text-[#564887]">$90k - $140k</span></div>
                                    <div className="flex justify-between border-b pb-2 font-medium"><strong>Level 3 (Architect)</strong><span className="font-bold text-[#564887]">$145k - $190k</span></div>
                                    <div className="flex justify-between font-medium"><strong>Level 4 (Executive/CISO)</strong><span className="font-bold text-[#564887]">$200k+</span></div>
                                </div>
                            </div>
                        )}

                    {/* Footer */}

                        <div className="bg-[#002b56] rounded-3xl p-10 text-white flex flex-col md:flex-row gap-10 items-center border-b-8 border-[#05F283] shadow-2xl relative overflow-hidden">
                            <div className="flex-1 text-center md:text-left relative z-10">
                                <h3 className="text-2xl font-bold mb-1 uppercase tracking-widest text-[#05F283]">Never Stop Adapting</h3>
                                <p className="text-slate-400 text-xs tracking-wider">Cybersecurity Mastery • Do Hard Things</p>
                            </div>
                            <div className="flex flex-col items-center sm:items-end gap-3 relative z-10">
                                <span className="text-[9px] text-slate-400 font-bold uppercase tracking-[0.3em]">Empowered By</span>
                                <img src="asset/iimages/alx%20white%20tranparent.png" alt="ALX" className="h-10 opacity-100" />
                            </div>
                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10" />
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
