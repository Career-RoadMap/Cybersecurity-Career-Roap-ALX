        body {

            overflow-x: hidden;
            background-color: #f8fafc;
        }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Watermark Background */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            opacity: 0.05;
            z-index: -10;
            width: 60vw;
            pointer-events: none;
            filter: grayscale(100%);
        }

        .tab-content { min-height: 600px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #002b56; border-radius: 10px; }
        
        .role-content {
            transition: max-height 0.3s ease-out, opacity 0.2s ease-in;
            overflow: hidden;
        }

        .nav-active {
            background-color: #002b56 !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: scale(1.02);
        }

        .standard-card:hover {

            transform: translateY(-2px);
        }

        .quiz-option:hover {

            background-color: #f1f5f9;

        const { useState, useEffect, useRef } = React;
        
        /**
         * Robust Icon Component
         * Prevents removeChild errors during state transitions by wrapping in a stable span
         */
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        node: iconRef.current
                    });
                }
            }, [name]);

            return (
                <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        const RoleItem = ({ title, desc }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="border-b border-slate-100 last:border-0">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full flex items-center justify-between py-3 group text-left hover:bg-slate-50/80 px-3 rounded-lg transition-all"
                    >
                        <div className="flex items-center gap-3">
                            <div className={`w-1.5 h-1.5 rounded-full transition-all duration-300 ${isOpen ? 'bg-[#05F283] scale-150' : 'bg-slate-300'}`} />
                            <span className={`text-xs md:text-sm font-semibold transition-colors ${isOpen ? 'text-[#002b56]' : 'text-slate-600'}`}>{title}</span>
                        </div>
                        <Icon name={isOpen ? "minus" : "plus"} size={14} className="text-slate-400" />
                    </button>
                    <div className={`role-content ${isOpen ? 'max-h-60 opacity-100 mb-4' : 'max-h-0 opacity-0'}`}>
                        <div className="ml-7 mr-2 p-3 bg-white rounded-lg border-l-4 border-[#05F283] shadow-sm">
                            <p className="text-[11px] md:text-xs text-slate-500 leading-relaxed italic">
                                {desc}
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const PathfinderQuiz = () => {
            const [step, setStep] = useState(0);
            const [scores, setScores] = useState({ D: 0, O: 0, S: 0 });
            const [result, setResult] = useState(null);

            const questions = [
                {
                    q: "When you find a locked door, what is your first instinct?",
                    options: [
                        { text: "Check the cameras and strengthen the lock.", type: "D" },
                        { text: "Try to find a way to pick the lock or find a key.", type: "O" },
                        { text: "Check the building's insurance and safety policies.", type: "S" }
                    ]
                },
                {
                    q: "What was your favorite lab activity?",
                    options: [
                        { text: "Analyzing logs and stopping simulated attacks.", type: "D" },
                        { text: "Breaking into Active Directory and stealing hashes.", type: "O" },
                        { text: "Reviewing GDPR laws and drafting policies.", type: "S" }
                    ]
                },
                {
                    q: "How do you prefer to spend your work day?",
                    options: [
                        { text: "Investigating puzzles and keeping things stable.", type: "D" },
                        { text: "Exploring unknown systems and finding flaws.", type: "O" },
                        { text: "Strategic planning and ensuring legal compliance.", type: "S" }
                    ]
                }
            ];

            const handleAnswer = (type) => {
                const newScores = { ...scores, [type]: scores[type] + 1 };
                setScores(newScores);
                if (step < questions.length - 1) {
                    setStep(step + 1);
                } else {
                    const top = Object.keys(newScores).reduce((a, b) => newScores[a] > newScores[b] ? a : b);
                    setResult(top);
                }
            };

            const resetQuiz = () => {
                setScores({ D: 0, O: 0, S: 0 });
                setResult(null);
                setStep(0);
            };

            if (result) {
                return (
                    <div key="quiz-result" className="bg-[#002b56] text-white p-8 rounded-3xl text-center animate-in shadow-xl">
                        <Icon name="award" size={48} className="mx-auto mb-4 text-[#05F283]" />
                        <h3 className="text-2xl font-bold mb-2">Recommended Path: 
                            {result === 'D' ? ' Defensive (Blue Team)' : result === 'O' ? ' Offensive (Red Team)' : ' Strategic (GRC/DPO)'}
                        </h3>
                        <p className="text-slate-300 text-sm mb-6">Based on your instincts, you belong in {result === 'D' ? 'the SOC' : result === 'O' ? 'Penetration Testing' : 'Compliance Management'}.</p>
                        <button onClick={resetQuiz} className="text-xs font-bold text-[#05F283] underline uppercase tracking-widest hover:text-white transition-colors">Restart Quiz</button>
                    </div>
                );
            }

            return (
                <div key={`quiz-step-${step}`} className="bg-white p-8 rounded-3xl shadow-lg border border-slate-100 animate-in">
                    <div className="flex justify-between items-center mb-6">
                        <h3 className="font-bold text-[#002b56]">Pathfinder Quiz</h3>
                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Question {step + 1} of 3</span>
                    </div>
                    <p className="text-sm font-medium text-slate-700 mb-6">{questions[step].q}</p>
                    <div className="space-y-3">
                        {questions[step].options.map((opt, i) => (
                            <button 
                                key={i} 
                                onClick={() => handleAnswer(opt.type)}
                                className="w-full text-left p-4 border border-slate-200 rounded-xl text-xs font-semibold text-slate-600 transition-all quiz-option"
                            >
                                {opt.text}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

                                                    </div>
                                                    <div className="pt-4 border-t border-slate-100">
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase mb-2">Target Certification</p>
                                                        <span className="text-[10px] font-bold bg-slate-50 border border-slate-200 px-2 py-1 rounded text-slate-600 block text-center truncate">{track.certs}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        )}

                        {/* TAB: BENCHMARKS */}
                        {activeTab === 'benchmarks' && (
                            <div className="animate-in space-y-10">
                                <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 max-w-4xl mx-auto">
                                    <div className="bg-[#564887] p-8 text-white text-center">
                                        <h2 className="text-xl font-bold flex items-center justify-center gap-3 text-white"><Icon name="award" /> Global Market Benchmarks</h2>
                                    </div>
                                    <div className="p-8 text-sm space-y-4">
                                        <div className="flex justify-between border-b pb-2 font-medium"><strong>Level 1 (Entry)</strong><span className="font-bold text-[#564887]">$55k - $85k</span></div>
                                        <div className="flex justify-between border-b pb-2 font-medium"><strong>Level 2 (Specialist)</strong><span className="font-bold text-[#564887]">$90k - $140k</span></div>
                                        <div className="flex justify-between border-b pb-2 font-medium"><strong>Level 3 (Architect)</strong><span className="font-bold text-[#564887]">$145k - $190k</span></div>
                                        <div className="flex justify-between font-medium"><strong>Level 4 (Executive/CISO)</strong><span className="font-bold text-[#564887]">$200k+</span></div>
                                    </div>
                                </div>

                                <div className="max-w-5xl mx-auto">
                                    <h3 className="text-xl font-bold text-[#002b56] mb-6 flex items-center gap-2">
                                        <div className="w-8 h-1 bg-[#05F283]" /> Career Launch Boards
                                    </h3>
                                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                        {jobBoards.map((board, i) => (
                                            <a 
                                                key={i} 
                                                href={board.url} 
                                                target="_blank" 
                                                rel="noopener noreferrer"
                                                className="bg-white/95 backdrop-blur-sm p-4 rounded-xl shadow-sm border border-slate-100 hover:border-[#05F283] hover:shadow-md transition-all flex flex-col items-center text-center group"
                                            >
                                                <div className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-[#05F283]/10 transition-colors">
                                                    <Icon name={board.icon} size={18} className="text-slate-400 group-hover:text-[#002b56]" />
                                                </div>
                                                <span className="text-xs font-bold text-slate-700 group-hover:text-[#002b56]">{board.name}</span>
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: TOOLKIT */}
                        {activeTab === 'toolkit' && (
                            <div className="animate-in space-y-12">
                                {Object.entries(toolkit).map(([sectionTitle, tools]) => (
                                    <div key={sectionTitle}>
                                        <h3 className="text-xl font-bold text-[#002b56] mb-6 flex items-center gap-2">
                                            <div className="w-8 h-1 bg-[#05F283]" /> {sectionTitle}
                                        </h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {tools.map((tool, i) => (
                                                <a 
                                                    key={i} 
                                                    href={tool.url} 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="bg-white p-6 rounded-2xl shadow-md border-l-4 border-[#05F283] hover:shadow-lg transition-all standard-card border-slate-100 border block group"
                                                >
                                                    <div className="flex justify-between items-start mb-3">
                                                        <h4 className="font-bold text-[#002b56] text-lg group-hover:text-[#564887] transition-colors">{tool.name}</h4>
                                                        <Icon name="external-link" size={12} className="text-slate-300 group-hover:text-[#05F283]" />
                                                    </div>
                                                    <span className="text-[9px] bg-slate-50 px-2 py-0.5 rounded font-bold text-slate-400 uppercase border border-slate-100 mb-2 inline-block">{tool.category}</span>
                                                    <p className="text-xs text-slate-500 leading-relaxed italic">"{tool.desc}"</p>
                                                </a>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* TAB: SPECIALTIES */}
                        {activeTab === 'specialties' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-in max-w-6xl mx-auto">
                                <div className="bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-xl border-l-[12px] border-[#05F283]">
                                    <div className="w-12 h-12 bg-[#05F283]/10 text-[#05F283] rounded-2xl flex items-center justify-center mb-6">
                                        <Icon name="brain" size={24} />
                                    </div>
                                    <h2 className="text-2xl font-bold text-[#002b56] mb-2">AI Security Track</h2>
                                    <p className="text-sm text-slate-500 mb-6">Defending LLMs and Automated Infrastructure.</p>
                                    <div className="space-y-1">
                                        <RoleItem title="LLM Red Teaming" desc="Attacking AI models to identify prompt injection, jailbreaking, and secret data leakage." />
                                        <RoleItem title="AI Defense Engineer" desc="Using ML models to proactively detect anomalous login patterns and zero-day behaviors in logs." />
                                    </div>
                                </div>
                                <div className="bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-xl border-l-[12px] border-[#564887]">
                                    <div className="w-12 h-12 bg-[#564887]/10 text-[#564887] rounded-2xl flex items-center justify-center mb-6">
                                        <Icon name="lock" size={24} />
                                    </div>
                                    <h2 className="text-2xl font-bold text-[#002b56] mb-2">Data Privacy (DPO)</h2>
                                    <p className="text-sm text-slate-500 mb-6">Legal & Ethical Compliance in the Digital Age.</p>
                                    <div className="space-y-1">
                                        <RoleItem title="Privacy Impact Assessor (PIA)" desc="Evaluating the risk of new product launches against global laws like GDPR and NDPR." />
                                        <RoleItem title="Subject Rights Lead" desc="Managing user requests for data access, correction, and the 'right to be forgotten'." />
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: CHECKLIST */}
                        {activeTab === 'checklist' && (
                            <div className="max-w-4xl mx-auto space-y-6 animate-in">
                                <div className="bg-[#564887] p-8 rounded-3xl text-white mb-6 text-center shadow-xl">
                                    <h2 className="text-2xl font-bold mb-2 text-white">Graduation Success Roadmap</h2>
                                    <p className="text-slate-300 text-sm">Actionable steps and resources to launch your career in 90 days.</p>
                                </div>
                                {checklist.map((item, i) => (
                                    <div key={i} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex gap-5 hover:bg-slate-50 transition-colors group">
                                        <div className="w-10 h-10 rounded-full bg-[#05F283]/10 text-[#002b56] flex items-center justify-center shrink-0 font-bold text-base border border-[#05F283]/30 group-hover:scale-110 transition-transform">{i+1}</div>
                                        <div className="flex-grow">
                                            <h4 className="font-bold text-[#002b56] text-sm md:text-base">{item.step}</h4>
                                            <p className="text-xs md:text-sm text-slate-500 mt-1 leading-relaxed mb-3">{item.detail}</p>
                                            <div className="flex flex-wrap gap-2">
                                                {item.links.map((link, li) => (
                                                    <a 
                                                        key={li} 
                                                        href={link.url} 
                                                        target="_blank" 
                                                        rel="noopener noreferrer"
                                                        className={`px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-2 transition-all ${link.type === 'download' ? 'bg-[#05F283] text-[#002b56] hover:bg-[#002b56] hover:text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                                    >
                                                        <Icon name={link.type === 'download' ? "download" : "external-link"} size={10} />
                                                        {link.label}
                                                    </a>
                                                ))}
                                            </div>
                                            {item.hint && (
                                                <div className="mt-4 p-3 bg-[#05F283]/5 border-l-4 border-[#05F283] text-[11px] text-slate-600 italic">
                                                    <strong>HINT:</strong> {item.hint}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* TAB: BIZ */}
                        {activeTab === 'biz' && (
                            <div className="space-y-8 animate-in max-w-6xl mx-auto">
                                <div className="bg-[#002b56] p-10 rounded-3xl text-white shadow-xl relative overflow-hidden border-b-8 border-[#05F283]">
                                    <h2 className="text-3xl font-bold mb-2 text-white">Entrepreneurial Tracks</h2>
                                    <p className="text-slate-200 text-sm italic">Monetize your technical skills as a business owner.</p>
                                    <Icon name="rocket" size={100} className="absolute -right-5 -bottom-5 opacity-10 rotate-12 text-white" />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    {[
                                        { tier: 'Service-Based', roles: [{t: 'Awareness Trainer', d: 'Phishing Training for SMBs'}, {t: 'Content Creator', d: 'Tech Blogging/Courses'}] },
                                        { tier: 'Agency Model', roles: [{t: 'Managed GRC', d: 'Policy & Audit Prep'}, {t: 'Vuln Agency', d: 'Scan & Remediate'}] },
                                        { tier: 'Strategic Model', roles: [{t: 'Virtual CISO', d: 'Strategy-as-a-Service'}, {t: 'Security Auditor', d: 'Niche Tech Audits'}] }
                                    ].map((item, i) => (
                                        <div key={i} className="bg-white/95 backdrop-blur-md rounded-2xl p-6 shadow-lg border-t-8 border-[#564887]">
                                            <h3 className="text-[10px] font-bold text-[#564887] uppercase tracking-widest mb-4 block border-b pb-2">{item.tier}</h3>
                                            <div className="space-y-1">
                                                {item.roles.map((r, ri) => (
                                                    <RoleItem key={ri} title={r.t} desc={r.d} />
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="max-w-7xl mx-auto mt-16 px-6 pb-12 w-full">
                        <div className="bg-[#002b56] rounded-3xl p-10 text-white flex flex-col md:flex-row gap-10 items-center border-b-8 border-[#05F283] shadow-2xl relative overflow-hidden">
                            <div className="flex-1 text-center md:text-left relative z-10">
                                <h3 className="text-2xl font-bold mb-1 uppercase tracking-widest text-[#05F283]">Never Stop Adapting</h3>
                                <p className="text-slate-400 text-xs tracking-wider uppercase font-bold">Cybersecurity Mastery • Do Hard Things</p>
                            </div>
                            <div className="flex flex-col items-center sm:items-end gap-3 relative z-10">
                                <span className="text-[9px] text-slate-400 font-bold uppercase tracking-[0.3em]">Empowered By</span>
                                <img src="asset/images/alx%20white%20tranparent.png" alt="ALX" className="h-10 opacity-100" />
                            </div>
                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10" />
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
